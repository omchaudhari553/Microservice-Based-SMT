server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        
        - id: student-service
          uri: lb://student-service
          predicates:
            - Path=/api/students/**
        
        - id: course-service
          uri: lb://course-service
          predicates:
            - Path=/api/courses/**
        
        - id: enrollment-service
          uri: lb://enrollment-service
          predicates:
            - Path=/api/enrollments/**
        
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/student-profiles/**
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allow-credentials: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "health,info,gateway"
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.studentmanagement: INFO
    org.springframework.cloud.gateway: INFO
